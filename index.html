<!DOCTYPE html>
<html lang="et">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kultuuriinkubaator: Magistritöö Esitlus</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        :root {
            --ut-blue: #003d7c;
            --accent-teal: #11caa0;
            --bg-canvas: #e2e8f0;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-canvas);
        }

        #viewport {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(255,255,255,0.8) 0%, transparent 80%),
                linear-gradient(rgba(17, 202, 160, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(17, 202, 160, 0.05) 1px, transparent 1px);
            background-size: 100% 100%, 100px 100px, 100px 100px;
            perspective: 1000px;
        }

        #canvas {
            position: absolute;
            top: 50%; left: 50%;
            width: 0; height: 0;
            transform-style: preserve-3d;
            transition: transform 1.5s cubic-bezier(0.645, 0.045, 0.355, 1);
        }

        .slide {
            position: absolute;
            width: 1280px;
            height: 720px;
            margin-left: -640px; 
            margin-top: -360px;
            background: white;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.15);
            border-radius: 20px;
            padding: 70px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
            opacity: 0.2;
            transition: opacity 1s;
        }

        .slide.active { opacity: 1; }

        h1, h2 { font-family: 'Poppins', sans-serif; color: var(--ut-blue); margin: 0; }
        h1 { font-size: 60px; font-weight: 800; line-height: 1.1; margin-bottom: 20px; }
        h2 { font-size: 45px; margin-bottom: 40px; border-left: 8px solid var(--accent-teal); padding-left: 20px; }
        p, li { font-size: 22px; color: #475569; line-height: 1.6; margin-bottom: 15px; }
        
        ul { padding-left: 20px; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: center; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 40px; }
